<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f4f1;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
      border-radius: 8px;
    }
    h1 {
      margin-top: 0;
      color: #b3477f;
    }
    form {
      display: grid;
      gap: 16px;
    }
    label {
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 4px;
      background: #b3477f;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #923569;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contactez-nous</h1>
    <p>Pour toute question ou demande, remplissez le formulaire ci-dessous.</p>
    <form action="#" method="post">
      <div>
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" placeholder="Votre nom" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Votre adresse email" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Votre message" required></textarea>
      </div>
      <button type="submit">Envoyer</button>
    </form>
  </div>
</body>
</html>
