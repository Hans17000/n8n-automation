<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--color-primary); display: flex; align-items: center; justify-content: center; min-height: 150px; }
  .quote { text-align: center; padding: 20px; }
  .q-mark { font-family: var(--font-serif-display); font-size: 30px; color: var(--color-accent); line-height: 1; display: block; margin-bottom: 2px; }
  .q-text { font-family: var(--font-script); font-size: var(--text-quote); color: var(--color-text-on-dark); margin: 0; }
  .q-by { font-family: var(--font-sans-body); font-weight: 300; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--color-accent); display: block; margin-top: 8px; }
</style>
</head>
<body>
  <div class="quote">
    <span class="q-mark">«</span>
    <p class="q-text">Le désir est une curiosité qui se collectionne.</p>
    <span class="q-by">Iris</span>
  </div>
</body>
</html>
