<!-- @dsCard group="Colors" viewport="700x170" subtitle="Variantes clair / normal / foncé pour hover et états" name="Variantes" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--surface-page); }
  .group { display: grid; grid-template-columns: 90px 1fr 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .name { font-family: var(--font-sans-body); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .sw { height: 34px; display: flex; align-items: center; padding: 0 10px; font-family: var(--font-sans-body); font-weight: 300; font-size: 10.5px; letter-spacing: 0.06em; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="group">
    <span class="name">Noir d'encre</span>
    <div class="sw" style="background: var(--color-primary-light); color: var(--color-text-on-dark);">#2A2A4E light</div>
    <div class="sw" style="background: var(--color-primary); color: var(--color-text-on-dark);">#1A1A2E</div>
    <div class="sw" style="background: var(--color-primary-dark); color: var(--color-text-on-dark);">#0F0F1A dark</div>
  </div>
  <div class="group">
    <span class="name">Or antique</span>
    <div class="sw" style="background: var(--color-accent-light); color: var(--color-text-on-accent);">#D4BC8A light</div>
    <div class="sw" style="background: var(--color-accent); color: var(--color-text-on-accent);">#C9A96E</div>
    <div class="sw" style="background: var(--color-accent-dark); color: var(--color-text-on-accent);">#A88B52 dark · hover</div>
  </div>
  <div class="group">
    <span class="name">Ivoire</span>
    <div class="sw" style="background: var(--color-background); color: var(--color-text-primary); border: 0.5px solid var(--color-border);">#F5F0E8</div>
    <div class="sw" style="background: var(--color-background-dark); color: var(--color-text-primary);">#EBE5D9 dark</div>
    <div class="sw" style="background: transparent;"></div>
  </div>
</body>
</html>
