<!-- @dsCard group="Colors" viewport="700x190" subtitle="Les 5 couleurs de la marque — noir d'encre, or antique, ivoire, prune, bordeaux" name="Palette principale" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--surface-page); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; box-sizing: border-box; }
  .sw .n { font-family: var(--font-serif-display); font-size: 15px; letter-spacing: 0.04em; }
  .sw .h { font-family: var(--font-sans-body); font-weight: 300; font-size: 11px; letter-spacing: 0.08em; opacity: 0.75; }
  .light { color: var(--color-text-on-dark); }
  .dark { color: var(--color-text-primary); }
  .lbl { font-family: var(--font-sans-body); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="sw light" style="background: var(--color-primary);"><span class="n">Noir d'encre</span><span class="h">#1A1A2E</span></div>
      <div class="lbl">Principal</div>
    </div>
    <div>
      <div class="sw dark" style="background: var(--color-accent);"><span class="n">Or antique</span><span class="h">#C9A96E</span></div>
      <div class="lbl">Accent</div>
    </div>
    <div>
      <div class="sw dark" style="background: var(--color-background); border: 0.5px solid var(--color-border);"><span class="n">Ivoire</span><span class="h">#F5F0E8</span></div>
      <div class="lbl">Fond clair</div>
    </div>
    <div>
      <div class="sw light" style="background: var(--color-cabinet);"><span class="n">Prune</span><span class="h">#4A2040</span></div>
      <div class="lbl">Cabinet</div>
    </div>
    <div>
      <div class="sw light" style="background: var(--color-alert);"><span class="n">Bordeaux</span><span class="h">#6B2D3E</span></div>
      <div class="lbl">Alerte</div>
    </div>
  </div>
</body>
</html>
