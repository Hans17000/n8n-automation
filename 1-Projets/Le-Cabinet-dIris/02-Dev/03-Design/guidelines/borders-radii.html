<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Hairlines dorées, radii quasi nuls, cadre passe-partout" name="Bordures & radii" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px 24px; background: var(--surface-page); display: flex; align-items: center; gap: 28px; }
  .meta { font-family: var(--font-sans-body); font-weight: 300; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: block; margin-top: 8px; }
  .box { width: 110px; height: 80px; background: var(--color-background); box-sizing: border-box; }
</style>
</head>
<body>
  <div>
    <div class="box" style="border: 0.5px solid var(--color-border);"></div>
    <span class="meta">Hairline 0.5px · or 30%</span>
  </div>
  <div>
    <div class="box" style="border: 0.5px solid var(--color-border-strong);"></div>
    <span class="meta">Hairline forte · hover</span>
  </div>
  <div>
    <div class="box" style="border: 0.5px solid var(--color-border-strong); padding: 8px;"><div style="width: 100%; height: 100%; background: var(--color-background-dark);"></div></div>
    <span class="meta">Cadre image · pad 8px</span>
  </div>
  <div>
    <div class="box" style="border: 1px solid var(--color-accent); border-radius: 2px;"></div>
    <span class="meta">Radius max · 2px</span>
  </div>
</body>
</html>
