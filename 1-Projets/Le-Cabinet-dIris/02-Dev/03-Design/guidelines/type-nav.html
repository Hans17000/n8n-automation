<!-- @dsCard group="Type" viewport="700x160" subtitle="Navigation uppercase 0.15em · libellés boutons serif" name="Navigation & libellés" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); }
  .nav { background: var(--color-primary); border-bottom: 1px solid var(--color-accent); padding: 18px 24px; display: flex; align-items: center; gap: 22px; }
  .nav a { font-family: var(--font-serif-display); font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--color-text-on-dark); text-decoration: none; transition: color 0.3s ease; }
  .nav a:hover { color: var(--color-accent); }
  .sep { display: inline-block; width: 1px; height: 20px; background: var(--color-accent); }
  .cabinet-entry { font-family: var(--font-serif-display); font-style: italic; text-transform: none !important; letter-spacing: 0.05em !important; color: var(--color-accent) !important; border: 1px solid var(--color-accent); padding: 6px 18px; border-radius: 2px; transition: all 0.3s ease; }
  .cabinet-entry:hover { background: var(--color-accent); color: var(--color-primary) !important; }
  .sub { font-family: var(--font-sans-body); font-weight: 300; font-size: 13px; color: var(--color-accent); letter-spacing: 0.2em; text-transform: uppercase; padding: 18px 24px; display: block; }
</style>
</head>
<body>
  <nav class="nav">
    <a href="#">Les Étoffes</a>
    <a href="#">Les Nuits</a>
    <a href="#">Les Voiles</a>
    <a href="#">Les Élixirs</a>
    <a href="#">Les Écrins</a>
    <span class="sep"></span>
    <a href="#" class="cabinet-entry">Poussez la porte</a>
  </nav>
  <span class="sub">Sous-titre · Lato 300 · 0.2em uppercase</span>
</body>
</html>
