<!-- @dsCard group="Type" viewport="700x280" subtitle="Cormorant Garamond — hiérarchie des titres" name="Display serif" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); }
  .spec { display: flex; align-items: baseline; gap: 18px; margin-bottom: 10px; }
  .meta { font-family: var(--font-sans-body); font-weight: 300; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); min-width: 120px; }
  h1, h2, h3, .hero { margin: 0; }
  .hero { font-family: var(--font-serif-display); font-size: 44px; font-weight: 400; letter-spacing: 0.1em; color: var(--color-primary); }
</style>
</head>
<body>
  <div class="spec"><span class="meta">Hero · 400 · 0.1em</span><span class="hero">Le Cabinet d'Iris</span></div>
  <div class="spec"><span class="meta">H1 · 600 · 2rem</span><h1>Les Étoffes</h1></div>
  <div class="spec"><span class="meta">H2 · 600 · 1.6rem</span><h2>Sélection d'Iris</h2></div>
  <div class="spec"><span class="meta">H3 · 600 · 1.3rem</span><h3>Le Boudoir Noir</h3></div>
  <div class="spec"><span class="meta">Italique · Cabinet</span><span style="font-family: var(--font-serif-display); font-style: italic; font-size: 20px; color: var(--color-accent);">Poussez la porte</span></div>
</body>
</html>
