<!-- @dsCard group="Boutique" viewport="1280x860" subtitle="Recréation cliquable — homepage, sas du Cabinet, catégories, fiche produit" name="Boutique Le Cabinet d'Iris" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Cabinet d'Iris — Boutique</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-background); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-catalog.jsx"></script>
<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('cabinet-iris-route')) || { name: 'home' }; }
    catch (e) { return { name: 'home' }; }
  });
  const [cartCount, setCartCount] = React.useState(0);

  const go = (name, params = {}) => {
    const r = { name, ...params };
    setRoute(r);
    try { localStorage.setItem('cabinet-iris-route', JSON.stringify(r)); } catch (e) {}
    window.scrollTo(0, 0);
  };

  let screen = null;
  if (route.name === 'home') screen = <HomePage go={go} />;
  else if (route.name === 'gate') screen = <GatePage go={go} />;
  else if (route.name === 'cabinet') screen = <CabinetPage go={go} />;
  else if (route.name === 'category') screen = <CategoryPage go={go} category={route.category} />;
  else if (route.name === 'product') screen = <ProductPage go={go} product={route.product} category={route.category} onAddToCart={() => setCartCount((c) => c + 1)} />;

  const label = { home: 'Accueil', gate: 'Sas du Cabinet', cabinet: 'Le Cabinet', category: route.category, product: 'Fiche produit' }[route.name];

  return (
    <div data-screen-label={label}>
      <Header go={go} route={route} cartCount={cartCount} />
      {screen}
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
